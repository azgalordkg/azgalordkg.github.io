<!DOCTYPE html>
<html lang="en">
	<head>
        <meta charset="UTF-8">
        <title>taks-2</title>
    </head>
    <body>
		<script>
			var age = prompt('Назовите ваш возвраст:', '');
			age = parseInt(age);
			
			if (age >= 1 && age <= 13) {
				alert('Рекомендую посмотреть мультфильм \'Алладин\'!');
			} else if (age >=14 && age <= 17) {
				alert('В вашем случае, я бы посмотрел \'В погоне за счастьем\'!');
			} else if (age >= 18 && age <= 30) {
				alert('Вам очень понравятся фильмы \'Запах женщины\' и \'Крестный отец\'!');
			} else if (age >= 30 && age <= 65) {
				alert('Скорее всего вы уже посмотрели практически все отличные фильмы которые существуют, поэтому...');
				alert('...попробуйте сериал \'Игра престолов\'!')
			} else if (isNaN(age) || age < 1) {
				alert('Вы некорректно ввели возвраст, необходимо ввести цифры.');	
			} else {
				alert('В вашем возврасте рекомендую посмотреть мультфильм \'Алладин\'=)')
			}
		</script>
    </body>
</html>
